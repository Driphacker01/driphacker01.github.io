<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart - Your Online Store</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        header{
            background:#111;
            color:white;
            padding:20px;
            text-align:center;
        }

        nav{
            display:flex;
            justify-content:center;
            gap:20px;
            margin-top:10px;
        }

        nav a{
            color:white;
            text-decoration:none;
        }

        .hero{
            text-align:center;
            padding:80px 20px;
            background:white;
        }

        .hero h1{
            font-size:48px;
        }

        .hero p{
            margin:20px 0;
            color:#666;
        }

        .btn{
            display:inline-block;
            background:#007bff;
            color:white;
            padding:15px 30px;
            border-radius:5px;
            text-decoration:none;
        }

        .products{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
            padding:40px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 5px 10px rgba(0,0,0,.1);
        }

        .card img{
            width:100%;
            border-radius:10px;
        }

        .price{
            color:green;
            font-size:22px;
            margin:10px 0;
        }

        button{
            background:black;
            color:white;
            border:none;
            padding:10px 20px;
            cursor:pointer;
            border-radius:5px;
        }

        footer{
            background:#111;
            color:white;
            text-align:center;
            padding:20px;
            margin-top:40px;
        }
    </style>
</head>

<body>

<header>
    <h2>NovaCart</h2>

    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Welcome to NovaCart</h1>
    <p>Discover trending products at amazing prices.</p>

    <a href="#products" class="btn">Shop Now</a>
</section>

<section class="products" id="products">

    <div class="card">
        <img src="https://via.placeholder.com/300x250" alt="Product">
        <h3>Wireless Earbuds</h3>
        <p class="price">R399</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x250" alt="Product">
        <h3>Smart Watch</h3>
        <p class="price">R799</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x250" alt="Product">
        <h3>Bluetooth Speaker</h3>
        <p class="price">R599</p>
        <button>Buy Now</button>
    </div>

</section>

<footer>
    <p>&copy; 2026 NovaCart. All Rights Reserved.</p>
</footer>

</body>
</html>
